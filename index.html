<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TicketFlow - Cadastro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header class="navbar">
        <div class="logo">
            <span class="ticket">TICKET</span><span class="flow">FLOW</span>
        </div>
        <nav class="nav-links">
            <a href="#">Sobre</a>
            <a href="#">Suporte</a>
            <button class="btn-connect" onclick="window.location.href='login.html'"><i class="fas fa-sign-in-alt"></i> Conectar</button>
        </nav>
    </header>

    <main class="main-container">
        <div class="content-wrapper">
            
            <section class="login-box">
                <h1>Criar Conta</h1>
                <p class="subtitle">Cadastre-se para garantir seus ingressos</p>
                
                <form id="registerForm">
                     <div class="input-group">
                        <label for="username">Nome de usuário</label>
                        <input type="text" id="username" placeholder="Escolha um nome de usuário..." required>
                    </div>
    
                    <div class="input-group">
                        <label for="email">Endereço de e-mail</label>
                        <input type="email" id="email" placeholder="exemplo@email.com" required>
                    </div>
    
                    <div class="input-group">
                        <label for="password">Senha</label>
                        <input type="password" id="password" placeholder="Crie uma senha forte..." required>
                    </div>
                    
                    <button type="submit" class="btn-submit">Registrar e Entrar</button>
                </form>
            </section>

            <section class="illustration-box">
                <img src="https://images.unsplash.com/photo-1508098682722-e99c43a406b2?w=500&auto=format&fit=crop&q=60" alt="Copa do Mundo Ingressos" class="promo-img">
            </section>

        </div>
    </main>

    <footer class="footer">
        <div class="footer-container">
            <div class="footer-brand">
                <div class="logo">
                    <span class="ticket">TICKET</span><span class="flow">FLOW</span>
                </div>
                <div class="social-icons">
                    <a href="#"><i class="fab fa-facebook-f"></i></a>
                    <a href="#"><i class="fab fa-linkedin-in"></i></a>
                    <a href="#"><i class="fab fa-youtube"></i></a>
                    <a href="#"><i class="fab fa-instagram"></i></a>
                </div>
            </div>
            
            <div class="footer-links">
                <div class="footer-column">
                    <h3>Sobre</h3>
                    <a href="#">Quem somos</a>
                    <a href="#">Perguntas frequentes</a>
                </div>
                <div class="footer-column">
                    <h3>Suporte</h3>
                    <a href="#">Abrir ticket</a>
                    <a href="#">Soluções</a>
                </div>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
